name: Checks

on:
  pull_request:
  push:
    branches: [main]

jobs:
  structure:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify repository structure
        run: |
          test -f README.md
          test -f MobileApp/package.json
          test -f AdminPortal/package.json
          test -f Backend/infra/template.yaml
