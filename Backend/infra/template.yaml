AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: Nianza foundation backend infrastructure

Parameters:
  Environment:
    Type: String
    Default: dev
    AllowedValues: [dev, prod]
  AdminEmail:
    Type: String
    Default: eja+nianza@banxito.com
    Description: Initial admin user email. Cognito sends this user a temporary password on stack creation.
  InitialAdminRole:
    Type: String
    Default: super_admin
    AllowedValues: [super_admin, content_editor, operations]
    Description: Application role assigned to the initial admin user.
  DeepgramApiKey:
    Type: String
    NoEcho: true
    Default: ""
    Description: Deepgram API key for mobile voice STT/TTS. Pass from a secure local variable at deploy time.
  DeepgramTtsModel:
    Type: String
    Default: aura-2-cordelia-en
    Description: Deepgram Aura voice model used for Patricia.
  DeepgramSttModel:
    Type: String
    Default: nova-2
    Description: Deepgram speech-to-text model for parent voice notes.

Globals:
  Function:
    Runtime: nodejs20.x
    Timeout: 30
    MemorySize: 256
    Architectures: [arm64]
    Environment:
      Variables:
        ENVIRONMENT: !Ref Environment
  Api:
    Cors:
      AllowMethods: "'GET,POST,PUT,DELETE,OPTIONS'"
      AllowHeaders: "'Authorization,Content-Type'"
      AllowOrigin: "'*'"

Resources:
  MobileUserPool:
    Type: AWS::Cognito::UserPool
    Properties:
      UserPoolName: !Sub nianza-mobile-${Environment}
      UserPoolTags:
        App: Nianza
        Env: !Ref Environment
        Owner: eja
      UsernameAttributes: [email]
      AutoVerifiedAttributes: [email]
      AccountRecoverySetting:
        RecoveryMechanisms:
          - Name: verified_email
            Priority: 1
      Policies:
        PasswordPolicy:
          MinimumLength: 10
          RequireLowercase: true
          RequireNumbers: true
          RequireSymbols: false
          RequireUppercase: true
      Schema:
        - Name: email
          AttributeDataType: String
          Mutable: true
          Required: true
        - Name: parent_name
          AttributeDataType: String
          Mutable: true
          Required: false
        - Name: locale
          AttributeDataType: String
          Mutable: true
          Required: false

  MobileUserPoolClient:
    Type: AWS::Cognito::UserPoolClient
    Properties:
      ClientName: !Sub nianza-mobile-app-${Environment}
      UserPoolId: !Ref MobileUserPool
      GenerateSecret: false
      PreventUserExistenceErrors: ENABLED
      ExplicitAuthFlows:
        - ALLOW_REFRESH_TOKEN_AUTH
        - ALLOW_USER_PASSWORD_AUTH
        - ALLOW_USER_SRP_AUTH
      AccessTokenValidity: 60
      IdTokenValidity: 60
      RefreshTokenValidity: 90
      TokenValidityUnits:
        AccessToken: minutes
        IdToken: minutes
        RefreshToken: days
      ReadAttributes:
        - email
        - custom:parent_name
        - custom:locale
      WriteAttributes:
        - email
        - custom:parent_name
        - custom:locale

  AdminUserPool:
    Type: AWS::Cognito::UserPool
    Properties:
      UserPoolName: !Sub nianza-admin-${Environment}
      UserPoolTags:
        App: Nianza
        Env: !Ref Environment
        Owner: eja
      UsernameAttributes: [email]
      AutoVerifiedAttributes: [email]
      AdminCreateUserConfig:
        AllowAdminCreateUserOnly: true
        InviteMessageTemplate:
          EmailSubject: !Sub "Your Nianza ${Environment} admin account"
          EmailMessage: "Your Nianza admin username is {username} and your temporary password is {####}"
      AccountRecoverySetting:
        RecoveryMechanisms:
          - Name: verified_email
            Priority: 1
      Policies:
        PasswordPolicy:
          MinimumLength: 12
          RequireLowercase: true
          RequireNumbers: true
          RequireSymbols: true
          RequireUppercase: true
          TemporaryPasswordValidityDays: 7
      Schema:
        - Name: email
          AttributeDataType: String
          Mutable: true
          Required: true
        - Name: role
          AttributeDataType: String
          Mutable: true
          Required: false

  AdminUserPoolClient:
    Type: AWS::Cognito::UserPoolClient
    Properties:
      ClientName: !Sub nianza-admin-portal-${Environment}
      UserPoolId: !Ref AdminUserPool
      GenerateSecret: false
      PreventUserExistenceErrors: ENABLED
      ExplicitAuthFlows:
        - ALLOW_REFRESH_TOKEN_AUTH
        - ALLOW_USER_PASSWORD_AUTH
        - ALLOW_USER_SRP_AUTH
      AccessTokenValidity: 60
      IdTokenValidity: 60
      RefreshTokenValidity: 30
      TokenValidityUnits:
        AccessToken: minutes
        IdToken: minutes
        RefreshToken: days
      ReadAttributes:
        - email
        - custom:role
      WriteAttributes:
        - email

  InitialAdminUser:
    Type: AWS::Cognito::UserPoolUser
    Properties:
      UserPoolId: !Ref AdminUserPool
      Username: !Ref AdminEmail
      DesiredDeliveryMediums: [EMAIL]
      UserAttributes:
        - Name: email
          Value: !Ref AdminEmail
        - Name: email_verified
          Value: "true"
        - Name: custom:role
          Value: !Ref InitialAdminRole

  AdminApi:
    Type: AWS::Serverless::Api
    Properties:
      Name: !Sub nianza-admin-api-${Environment}
      StageName: !Ref Environment
      Auth:
        DefaultAuthorizer: AdminCognitoAuthorizer
        AddDefaultAuthorizerToCorsPreflight: false
        Authorizers:
          AdminCognitoAuthorizer:
            UserPoolArn: !GetAtt AdminUserPool.Arn
            Identity:
              Header: Authorization
      GatewayResponses:
        UNAUTHORIZED:
          StatusCode: 401
          ResponseTemplates:
            application/json: '{"error":"Unauthorized"}'
        ACCESS_DENIED:
          StatusCode: 403
          ResponseTemplates:
            application/json: '{"error":"Forbidden"}'

  MobileApi:
    Type: AWS::Serverless::Api
    Properties:
      Name: !Sub nianza-mobile-api-${Environment}
      StageName: !Ref Environment

  AdminAuditLogTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      TableName: !Sub nianza-admin-audit-log-${Environment}
      BillingMode: PAY_PER_REQUEST
      Tags:
        - Key: App
          Value: Nianza
        - Key: Env
          Value: !Ref Environment
        - Key: Owner
          Value: eja
      AttributeDefinitions:
        - AttributeName: adminUserId
          AttributeType: S
        - AttributeName: timestampActionId
          AttributeType: S
        - AttributeName: action
          AttributeType: S
        - AttributeName: timestamp
          AttributeType: S
      KeySchema:
        - AttributeName: adminUserId
          KeyType: HASH
        - AttributeName: timestampActionId
          KeyType: RANGE
      GlobalSecondaryIndexes:
        - IndexName: action-timestamp-index
          KeySchema:
            - AttributeName: action
              KeyType: HASH
            - AttributeName: timestamp
              KeyType: RANGE
          Projection:
            ProjectionType: ALL

  AdminSessionsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub nianza-admin-sessions-${Environment}
      BillingMode: PAY_PER_REQUEST
      Tags:
        - Key: App
          Value: Nianza
        - Key: Env
          Value: !Ref Environment
        - Key: Owner
          Value: eja
      AttributeDefinitions:
        - AttributeName: adminUserId
          AttributeType: S
        - AttributeName: sessionId
          AttributeType: S
      KeySchema:
        - AttributeName: adminUserId
          KeyType: HASH
        - AttributeName: sessionId
          KeyType: RANGE
      TimeToLiveSpecification:
        AttributeName: expiresAt
        Enabled: true

  ContentLibraryTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      TableName: !Sub nianza-content-library-${Environment}
      BillingMode: PAY_PER_REQUEST
      Tags:
        - Key: App
          Value: Nianza
        - Key: Env
          Value: !Ref Environment
        - Key: Owner
          Value: eja
      AttributeDefinitions:
        - AttributeName: contentId
          AttributeType: S
        - AttributeName: version
          AttributeType: S
        - AttributeName: language
          AttributeType: S
        - AttributeName: contentType
          AttributeType: S
      KeySchema:
        - AttributeName: contentId
          KeyType: HASH
        - AttributeName: version
          KeyType: RANGE
      GlobalSecondaryIndexes:
        - IndexName: language-contentType-index
          KeySchema:
            - AttributeName: language
              KeyType: HASH
            - AttributeName: contentType
              KeyType: RANGE
          Projection:
            ProjectionType: ALL

  AdminContentFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub nianza-admin-content-${Environment}
      CodeUri: ../
      Handler: admin/content/handler.handler
      Environment:
        Variables:
          CONTENT_TABLE: !Ref ContentLibraryTable
          AUDIT_TABLE: !Ref AdminAuditLogTable
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref ContentLibraryTable
        - DynamoDBWritePolicy:
            TableName: !Ref AdminAuditLogTable
      Events:
        ContentList:
          Type: Api
          Properties:
            RestApiId: !Ref AdminApi
            Path: /admin/v1/content
            Method: GET
        ContentCreate:
          Type: Api
          Properties:
            RestApiId: !Ref AdminApi
            Path: /admin/v1/content
            Method: POST
        ContentReview:
          Type: Api
          Properties:
            RestApiId: !Ref AdminApi
            Path: /admin/v1/content/{contentId}/review
            Method: POST
        ContentApprove:
          Type: Api
          Properties:
            RestApiId: !Ref AdminApi
            Path: /admin/v1/content/{contentId}/approve
            Method: POST

  MobileContentFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub nianza-mobile-content-${Environment}
      CodeUri: ../
      Handler: mobile/content/handler.handler
      Environment:
        Variables:
          CONTENT_TABLE: !Ref ContentLibraryTable
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref ContentLibraryTable
      Events:
        DailyNote:
          Type: Api
          Properties:
            RestApiId: !Ref MobileApi
            Path: /mobile/v1/content/daily-note
            Method: GET

  MobileVoiceFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub nianza-mobile-voice-${Environment}
      CodeUri: ../
      Handler: mobile/voice/handler.handler
      Timeout: 45
      MemorySize: 512
      Environment:
        Variables:
          DEEPGRAM_API_KEY: !Ref DeepgramApiKey
          DEEPGRAM_TTS_MODEL: !Ref DeepgramTtsModel
          DEEPGRAM_STT_MODEL: !Ref DeepgramSttModel
      Events:
        VoiceTranscribe:
          Type: Api
          Properties:
            RestApiId: !Ref MobileApi
            Path: /mobile/v1/voice/transcribe
            Method: POST
        VoiceSpeak:
          Type: Api
          Properties:
            RestApiId: !Ref MobileApi
            Path: /mobile/v1/voice/speak
            Method: POST

Outputs:
  AdminApiUrl:
    Value: !Sub https://${AdminApi}.execute-api.${AWS::Region}.amazonaws.com/${Environment}/admin/v1
  MobileApiUrl:
    Value: !Sub https://${MobileApi}.execute-api.${AWS::Region}.amazonaws.com/${Environment}/mobile/v1
  MobileUserPoolId:
    Value: !Ref MobileUserPool
  MobileUserPoolClientId:
    Value: !Ref MobileUserPoolClient
  MobileUserPoolArn:
    Value: !GetAtt MobileUserPool.Arn
  AdminUserPoolId:
    Value: !Ref AdminUserPool
  AdminUserPoolClientId:
    Value: !Ref AdminUserPoolClient
  AdminUserPoolArn:
    Value: !GetAtt AdminUserPool.Arn
  InitialAdminEmail:
    Value: !Ref AdminEmail
  AdminAuditLogTableName:
    Value: !Ref AdminAuditLogTable
  AdminSessionsTableName:
    Value: !Ref AdminSessionsTable
  ContentLibraryTableName:
    Value: !Ref ContentLibraryTable
